    <script>
      window.MathJax = {
        tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["\\[", "\\]"]], processEnvironments: true },

      .render-failure { display: none; padding: 16px; border: 1px solid #dc2626; color: #991b1b; }
      .math-failed .render-failure { display: block; }
    </style>
