    <h2>Closed-Form Gaussian Posterior</h2>
<a class="anchor" id="posterior:gaussian-conjugate"></a>
<h3>Input and Assumption Nodes</h3>
<p>Input nodes: <code>likelihood.gaussian</code> and <code>prior.gaussian_beta</code>.</p>
<h3>Declaration</h3>
<p>The posterior is Gaussian:</p>
<div class="math">\[
  p(\beta\mid X,y)=\mathcal{N}(\mu_n,\Sigma_n).
\]</div>
<h3>Result</h3>
<p>The node <code>posterior.gaussian_conjugate</code> returns \((\mu_n,\Sigma_n)\).</p>
